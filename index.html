```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxera By Faziii</title>

<style>
body{
font-family:Arial,sans-serif;
margin:0;
padding:20px;
background:#f5f5f5;
}
header{
text-align:center;
padding:20px;
background:black;
color:white;
border-radius:10px;
}
.product{
background:white;
padding:15px;
margin-top:15px;
border-radius:10px;
}
button{
background:black;
color:white;
border:none;
padding:10px 15px;
border-radius:5px;
cursor:pointer;
}
input,textarea{
width:100%;
padding:10px;
margin-top:10px;
}
</style>
</head>

<body>

<header>
<h1>Luxera By Faziii</h1>
<p>Premium Watches & Wallets</p>
</header>

<div class="product">
<h3>Hublot Watch</h3>
<p>Price: Rs. 2500</p>
<button onclick="addToCart('Hublot Watch')">Add To Cart</button>
</div>

<div class="product">
<h3>Premium Wallet</h3>
<p>Price: Rs. 1200</p>
<button onclick="addToCart('Premium Wallet')">Add To Cart</button>
</div>

<h2>Checkout Form</h2>

<input type="text" id="name" placeholder="Your Name">
<input type="text" id="phone" placeholder="Phone Number">
<textarea id="address" placeholder="Address"></textarea>

<button onclick="sendOrder()">Place Order</button>

<script>

let cart=[];

function addToCart(product){
cart.push(product);
alert(product + " Added To Cart");
}

function sendOrder(){

let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let address=document.getElementById("address").value;

let message =
"New Order%0A%0A" +
"Name: " + name + "%0A" +
"Phone: " + phone + "%0A" +
"Address: " + address + "%0A" +
"Products: " + cart.join(", ");

window.open(
"https://wa.me/923005460203?text=" + message,
"_blank"
);

}

</script>

</body>
</html>
